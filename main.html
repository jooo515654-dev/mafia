<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنطقه المظلمه</title>
    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== التصميم الرئيسي ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Roboto', sans-serif;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        /* طبقة حماية إضافية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: -1;
        }

        /* ===== الهيدر الثابت ===== */
        .mafia-header {
            background: #0a0000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #8b0000;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 2rem;
            color: #8b0000;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 #8b0000;
        }

        .logo span {
            color: #8b0000;
        }

        .mafia-nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .mafia-nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .mafia-nav a:hover,
        .mafia-nav a.active {
            border-bottom-color: #8b0000;
            color: #fff;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 0, 0, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px solid #8b0000;
        }

        .user-area i {
            color: #8b0000;
        }

        /* ===== البانر ===== */
        .mafia-banner {
            background: linear-gradient(rgba(0, 0, 0, 0.8), #000), 
                        url('https://png.pngtree.com/background/20230519/original/pngtree-gangster-ps4-wallpapers-picture-image_2658863.jpg');
            background-size: cover;
            background-position: center;
            min-height: 300px;
            height: auto;
            padding: 3rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 3px solid #8b0000;
        }

        .banner-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 3px 3px 0 #8b0000;
        }

        .banner-content p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #b0b0b0;
            letter-spacing: 1px;
        }

        .banner-stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #8b0000;
            font-size: 0.9rem;
        }

        /* ===== أزرار الفلترة ===== */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.5rem;
            background: #0a0000;
            border-bottom: 2px solid #8b0000;
        }

        .filter-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #8b0000;
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            flex: 0 1 auto;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #8b0000;
            color: #fff;
            border-color: #8b0000;
        }

        /* ===== حاوية البوستات ===== */
        .posts-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem 5%;
            background: #000;
        }

        /* ===== أنماط البوستات ===== */
        .post-card {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            border-color: #8b0000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.3);
        }

        /* بوست الفيديو */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #8b0000;
            position: relative;
            aspect-ratio: 16/9;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #000;
        }

        /* بوست الصورة */
        .photo-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #8b0000;
            aspect-ratio: 16/9;
        }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* بوست النص */
        .post-card.text {
            background: #0a0000;
            min-height: 250px;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .text-content {
            padding: 1.5rem;
            width: 100%;
        }

        .blood-quote {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: #fff;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            quotes: "“" "”" "‘" "’";
        }

        .blood-quote::before {
            content: "“";
            color: #8b0000;
            font-size: 2rem;
            margin-left: 5px;
        }

        .blood-quote::after {
            content: "”";
            color: #8b0000;
            font-size: 2rem;
            margin-right: 5px;
        }

        .blood-author {
            color: #8b0000;
            font-size: 1rem;
            border-top: 1px dashed #8b0000;
            border-bottom: 1px dashed #8b0000;
            padding: 0.5rem;
            display: inline-block;
        }

        /* محتوى البوست المشترك */
        .post-content {
            padding: 1rem;
            flex: 1;
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }

        .post-description {
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-meta, .video-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #222;
            padding-top: 0.8rem;
            margin-top: auto;
        }

        .post-category {
            color: #8b0000;
        }

        /* ===== الفوتر ===== */
        .mafia-footer {
            background: #050000;
            padding: 2rem;
            text-align: center;
            border-top: 3px solid #8b0000;
            font-size: clamp(0.9rem, 3vw, 1rem);
        }

        /* تحسينات للأجهزة الصغيرة */
        @media (max-width: 768px) {
            .mafia-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .mafia-nav ul {
                gap: 0.8rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            .mafia-nav a {
                padding: 0.5rem;
                font-size: 0.9rem;
            }

            .filter-section {
                padding: 1rem;
            }

            .filter-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .posts-container {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1rem;
            }
        }

        /* تحسينات للأجهزة المتوسطة */
        @media (min-width: 769px) and (max-width: 1024px) {
            .posts-container {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        /* ===== الحماية من التفتيش ===== */
        .anti-inspect {
            display: none;
        }
    </style>
</head>
<body>
    <!-- الهيدر -->
    <header class="mafia-header">
        <div class="logo">
            <i class="fas fa-skull"></i>
            <h1>MAFIA<span>FTF</span></h1>
        </div>
        <nav class="mafia-nav">
            <ul>
                <li><a href="#" class="active">الرئيسية</a></li>
                <li><a href="#">صور</a></li>
                <li><a href="#">فيديوهات</a></li>
                <li><a href="#">نصوص</a></li>
            </ul>
        </nav>
        <div class="user-area">
            <i class="fas fa-user-secret"></i>
            <span>Don Corleone</span>
        </div>
    </header>

    <!-- البانر -->
    <section class="mafia-banner">
        <div class="banner-content">
            <h2>Father welcomes you</h2>
            <p>أرشيف المافيا السري - صور، فيديوهات، ووثائق</p>
            <div class="banner-stats">
                <div class="stat"><i class="fas fa-image"></i> 15+ صورة</div>
                <div class="stat"><i class="fas fa-video"></i> 8+ فيديو</div>
                <div class="stat"><i class="fas fa-quote-right"></i> 12+ نص</div>
            </div>
        </div>
    </section>

    <!-- الفلترة -->
    <div class="filter-section">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="video"><i class="fas fa-video"></i> فيديوهات</button>
        <button class="filter-btn" data-filter="photo"><i class="fas fa-image"></i> صور</button>
        <button class="filter-btn" data-filter="text"><i class="fas fa-quote-right"></i> نصوص</button>
    </div>

    <!-- البوستات -->
    <main class="posts-container" id="postsContainer"></main>

    <!-- الفوتر -->
    <footer class="mafia-footer">
        <p>حاليا انت غير موثوق لذا فتم اخفاء المحتوى عنك الى ان يقوم الفاذر بالموافقه عليك</p>
    </footer>

    <script>
        // ================================================
        // 1. التحقق من المصادقة (حماية صفحة main.html)
        // ================================================
        (function() {
            if (sessionStorage.getItem('mafiaAuth') !== 'true') {
                // للاختبار - يمكنك تعطيل هذا السطر مؤقتاً
                // window.location.replace('index.html');
            }
        })();

        // ================================================
        // 2. بيانات البوستات (ثابتة)
        // ================================================
     

        // ================================================
        // 3. دالة عرض البوستات
        // ================================================
        function displayPosts(posts) {
            const container = document.getElementById('postsContainer');
            if (!container) return;
            container.innerHTML = '';

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = `post-card ${post.type}`;

                if (post.type === 'video') {
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <video controls poster="${post.thumbnail}">
                                <source src="${post.videoUrl}" type="video/mp4">
                                متصفحك لا يدعم تشغيل الفيديو
                            </video>
                        </div>
                        <div class="post-content">
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-description">${post.description}</p>
                            <div class="video-stats">
                                <span><i class="fas fa-eye"></i> ${post.views}</span>
                                <span><i class="fas fa-clock"></i> ${post.duration}</span>
                                <span><i class="fas fa-calendar-alt"></i> ${post.date}</span>
                            </div>
                        </div>
                    `;
                } else if (post.type === 'photo') {
                    card.innerHTML = `
                        <div class="photo-wrapper">
                            <img src="${post.imageUrl}" alt="${post.title}" loading="lazy">
                        </div>
                        <div class="post-content">
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-description">${post.description}</p>
                            <div class="post-meta">
                                <span class="post-category"><i class="fas fa-map-marker-alt"></i> ${post.location}</span>
                                <span>${post.date}</span>
                            </div>
                        </div>
                    `;
                } else if (post.type === 'text') {
                    card.innerHTML = `
                        <div class="text-content">
                            <div class="blood-quote">${post.quote}</div>
                            <div class="blood-author">${post.author}</div>
                            <div style="color:#666; margin-top:1rem; font-size:0.8rem;">
                                <i class="fas fa-book-open"></i> ${post.context} | ${post.date}
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        // ================================================
        // 4. دالة الفلترة
        // ================================================
        function filterPosts(type) {
            if (type === 'all') {
                displayPosts(postsData);
            } else {
                displayPosts(postsData.filter(p => p.type === type));
            }

            // تحديث الأزرار
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === type);
            });
        }

        // ================================================
        // 5. تشغيل كل شيء عند تحميل الصفحة
        // ================================================
        document.addEventListener('DOMContentLoaded', () => {
            // عرض البوستات
            displayPosts(postsData);
            
            // إعداد أزرار الفلترة
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterPosts(e.target.dataset.filter);
                });
            });
        });
    </script>
</body>
</html>
