<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنطقه المظلمه</title>
    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== التصميم الرئيسي ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;  /* خلفية سوداء ثابتة */
            font-family: 'Roboto', sans-serif;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        /* طبقة حماية إضافية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: -1;
        }

        /* ===== الهيدر الثابت ===== */
        .mafia-header {
            background: #0a0000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #8b0000;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 2rem;
            color: #8b0000;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 #8b0000;
        }

        .logo span {
            color: #8b0000;
        }

        .mafia-nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .mafia-nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.5rem 1rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .mafia-nav a:hover,
        .mafia-nav a.active {
            border-bottom-color: #8b0000;
            color: #fff;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 0, 0, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px solid #8b0000;
        }

        .user-area i {
            color: #8b0000;
        }

        /* ===== البانر ===== */
        .mafia-banner {
            background: linear-gradient(rgba(0, 0, 0, 0.8), #000), 
                        url('https://png.pngtree.com/background/20230519/original/pngtree-gangster-ps4-wallpapers-picture-image_2658863.jpg');
            background-size: cover;
            background-position: center;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 3px solid #8b0000;
        }

        .banner-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 3px 3px 0 #8b0000;
        }

        .banner-content p {
            font-size: 1.2rem;
            color: #b0b0b0;
            letter-spacing: 1px;
        }

        .banner-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #8b0000;
        }

        /* ===== أزرار الفلترة ===== */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            background: #0a0000;
            border-bottom: 2px solid #8b0000;
        }

        .filter-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #8b0000;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #8b0000;
            color: #fff;
            border-color: #8b0000;
        }

        /* ===== حاوية البوستات ===== */
        .posts-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            padding: 2rem 5%;
            background: #000;
        }

        /* ===== أنماط البوستات (بدون أي كوفر) ===== */
        .post-card {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .post-card:hover {
            border-color: #8b0000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139, 0, 0, 0.3);
        }

        /* بوست الفيديو */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #8b0000;
        }

        .video-wrapper video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        /* بوست الصورة */
        .photo-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 2px solid #8b0000;
        }

        .photo-wrapper img {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        /* بوست النص */
        .post-card.text {
            background: #0a0000;
            min-height: 300px;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .text-content {
            padding: 2rem;
            width: 100%;
        }

        .blood-quote {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #fff;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            quotes: "“" "”" "‘" "’";
        }

        .blood-quote::before {
            content: "“";
            color: #8b0000;
            font-size: 2rem;
            margin-left: 5px;
        }

        .blood-quote::after {
            content: "”";
            color: #8b0000;
            font-size: 2rem;
            margin-right: 5px;
        }

        .blood-author {
            color: #8b0000;
            font-size: 1.1rem;
            border-top: 1px dashed #8b0000;
            border-bottom: 1px dashed #8b0000;
            padding: 0.5rem;
            display: inline-block;
        }

        /* محتوى البوست المشترك */
        .post-content {
            padding: 1.2rem;
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }

        .post-description {
            color: #b0b0b0;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid #222;
            padding-top: 0.8rem;
        }

        .post-category {
            color: #8b0000;
        }

        .video-stats {
            display: flex;
            gap: 1rem;
            color: #888;
            font-size: 0.85rem;
            border-top: 1px solid #222;
            padding-top: 0.8rem;
        }

        /* ===== الفوتر ===== */
        .mafia-footer {
            background: #050000;
            padding: 2rem;
            text-align: center;
            border-top: 3px solid #8b0000;
        }

        /* ===== الحماية من التفتيش ===== */
        .anti-inspect {
            display: none;
        }
    </style>
</head>
<body>
    <!-- عنصر الصوت المخفي (شغال تلقائي) -->


    <!-- الهيدر -->
    <header class="mafia-header">
        <div class="logo">
            <i class="fas fa-skull"></i>
            <h1>MAFIA<span>FTF</span></h1>
        </div>
        <nav class="mafia-nav">
            <ul>
                <li><a href="#" class="active">الرئيسية</a></li>
                <li><a href="#">صور</a></li>
                <li><a href="#">فيديوهات</a></li>
                <li><a href="#">نصوص</a></li>
            </ul>
        </nav>
        <div class="user-area">
            <i class="fas fa-user-secret"></i>
            <span>Don Corleone</span>
        </div>
    </header>

    <!-- البانر -->
    <section class="mafia-banner">
        <div class="banner-content">
            <h2>Father welcomes you</h2>
            <p>أرشيف المافيا السري - صور، فيديوهات، ووثائق</p>
            <div class="banner-stats">
                <div class="stat"><i class="fas fa-image"></i> 15+ صورة</div>
                <div class="stat"><i class="fas fa-video"></i> 8+ فيديو</div>
                <div class="stat"><i class="fas fa-quote-right"></i> 12+ نص</div>
            </div>
        </div>
    </section>

    <!-- الفلترة -->
    <div class="filter-section">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="video"><i class="fas fa-video"></i> فيديوهات</button>
        <button class="filter-btn" data-filter="photo"><i class="fas fa-image"></i> صور</button>
        <button class="filter-btn" data-filter="text"><i class="fas fa-quote-right"></i> نصوص</button>
    </div>

    <!-- البوستات -->
    <main class="posts-container" id="postsContainer"></main>

    <!-- الفوتر -->
    <footer class="mafia-footer">
        <p>حاليا انت غير موثوق لذا فتم اخفاء المحتوى عنك الى ان يقوم الفاذر بالموافقه عليك</p>
    </footer>

    <script>
        // ================================================
        // 1. التحقق من المصادقة (حماية صفحة main.html)
        // ================================================
        (function() {
            if (sessionStorage.getItem('mafiaAuth') !== 'true') {
                window.location.replace('index.html');
            }
        })();

        // ================================================
        // 2. نظام الحماية الشامل (يمنع أي محاولة تفتيش)
        // ================================================
        (function() {
            // قائمة بكل اختصارات التفتيش المعروفة
            const blockKeys = [
                'F12', 'I', 'i', 'U', 'u', 'C', 'c', 'J', 'j', 'S', 's',
                'F5', 'R', 'r', 'F11', 'F3', 'P', 'p', 'K', 'k'
            ];
            
            // منع النقر باليمين
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                window.location.replace('about:blank');
                document.body.innerHTML = '';
                throw new Error('Access Denied');
            });

            // مراقبة اختصارات لوحة المفاتيح
            document.addEventListener('keydown', function(e) {
                // التحقق من Ctrl, Shift, Cmd
                const isCtrl = e.ctrlKey || e.metaKey;
                const isShift = e.shiftKey;
                const key = e.key;
                
                // قائمة الشروط الممنوعة
                if (
                    (isCtrl && isShift && (key === 'I' || key === 'i' || key === 'J' || key === 'j' || key === 'C' || key === 'c')) || // Ctrl+Shift+I/J/C
                    (isCtrl && (key === 'U' || key === 'u' || key === 'S' || key === 's' || key === 'F5' || key === 'r' || key === 'R')) || // Ctrl+U/S/F5/R
                    (key === 'F12') || // F12
                    (isShift && key === 'F5') // Shift+F5
                ) {
                    e.preventDefault();
                    e.stopPropagation();
                    window.location.replace('about:blank');
                    document.body.innerHTML = '';
                    throw new Error('Access Denied');
                }
            });

            // كشف أدوات المطور (طريقة متقدمة)
            setInterval(function() {
                const before = new Date();
                debugger; // هذا يسبب توقف مؤقت إذا كانت الأدوات مفتوحة
                const after = new Date();
                if (after - before > 100) { // إذا كان الفرق كبير، يعني الأدوات مفتوحة
                    window.location.replace('about:blank');
                    document.body.innerHTML = '';
                }
            }, 1000);

            // منع السحب والإفلات للمحتوى
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });

            // منع تحديد النص
            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            // مسح أي محاولة لاستخدام console.log
            Object.defineProperty(window, 'console', {
                get: function() {
                    window.location.replace('about:blank');
                    document.body.innerHTML = '';
                    throw new Error('Console is disabled');
                },
                set: function() {}
            });

            // مسح أي محاولة لاستخدام eval
            window.eval = function() {
                window.location.replace('about:blank');
                document.body.innerHTML = '';
            };
        })();

        // ================================================
        // 3. بيانات البوستات (ثابتة بدون كوفر)
        // ================================================
      
        // ================================================
        // 4. دالة عرض البوستات (بدون كوفر)
        // ================================================
        function displayPosts(posts) {
            const container = document.getElementById('postsContainer');
            if (!container) return;
            container.innerHTML = '';

            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = `post-card ${post.type}`;

                if (post.type === 'video') {
                    card.innerHTML = `
                        <div class="video-wrapper">
                            <video controls poster="${post.thumbnail}">
                                <source src="${post.videoUrl}" type="video/mp4">
                            </video>
                        </div>
                        <div class="post-content">
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-description">${post.description}</p>
                            <div class="video-stats">
                                <span><i class="fas fa-eye"></i> ${post.views}</span>
                                <span><i class="fas fa-clock"></i> ${post.duration}</span>
                                <span><i class="fas fa-calendar-alt"></i> ${post.date}</span>
                            </div>
                        </div>
                    `;
                } else if (post.type === 'photo') {
                    card.innerHTML = `
                        <div class="photo-wrapper">
                            <img src="${post.imageUrl}" alt="${post.title}" loading="lazy">
                        </div>
                        <div class="post-content">
                            <h3 class="post-title">${post.title}</h3>
                            <p class="post-description">${post.description}</p>
                            <div class="post-meta">
                                <span class="post-category"><i class="fas fa-map-marker-alt"></i> ${post.location}</span>
                                <span>${post.date}</span>
                            </div>
                        </div>
                    `;
                } else if (post.type === 'text') {
                    card.innerHTML = `
                        <div class="text-content">
                            <div class="blood-quote">${post.quote}</div>
                            <div class="blood-author">${post.author}</div>
                            <div style="color:#666; margin-top:1rem; font-size:0.8rem;">
                                <i class="fas fa-book-open"></i> ${post.context} | ${post.date}
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        // ================================================
        // 5. دالة الفلترة
        // ================================================
        function filterPosts(type) {
            if (type === 'all') {
                displayPosts(postsData);
            } else {
                displayPosts(postsData.filter(p => p.type === type));
            }

            // تحديث الأزرار
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === type);
            });
        }

        // ================================================
        // 6. تشغيل الصوت عند التفاعل الأول للمستخدم
        // ================================================
        function initAudio() {
            const audio = document.getElementById('backgroundSound');
            if (audio) {
                audio.volume = 0.5; // مستوى الصوت 50%
                audio.play().catch(e => {
                    // المتصفح منع التشغيل التلقائي، ننتظر تفاعل المستخدم
                    document.addEventListener('click', function once() {
                        audio.play();
                        document.removeEventListener('click', once);
                    });
                });
            }
        }

        // ================================================
        // 7. تشغيل كل شيء عند تحميل الصفحة
        // ================================================
        document.addEventListener('DOMContentLoaded', () => {
            // عرض البوستات
            displayPosts(postsData);
            
            // إعداد أزرار الفلترة
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterPosts(e.target.dataset.filter);
                });
            });

            // تشغيل الصوت
            initAudio();
        });
    </script>
</body>
</html>
